<!doctype html>
<html lang="es" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- SEO Meta Tags -->
    <title>Hot Wheels AI Collector - Escáner Inteligente e Inventario Compartido</title>
    <meta name="description" content="Escanea tus autos Hot Wheels usando inteligencia artificial, identifica modelos, series, años de lanzamiento y comparte tu colección sincronizada en tiempo real con otros usuarios." />
    <meta name="keywords" content="hot wheels, coleccionismo, escáner ia, identificación de autos, inventario compartido, treasure hunt" />
    <meta name="author" content="Antigravity AI" />
    
    <!-- PWA Config (Desactivado Service Worker para evitar conflictos de caché y pantallas en negro) -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ff3300" />
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister().then(function(boolean) {
              if (boolean) {
                console.log('Service Worker obsoleto eliminado con éxito.');
                window.location.reload(); // Recargar una vez para limpiar la caché
              }
            });
          }
        });
      }
    </script>
    
    <!-- Web App Capability -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="application-name" content="HW AI" />
    <meta name="apple-mobile-web-app-title" content="HW AI" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
